<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日本語ドリル — Japanese Drill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: "Hiragino Sans", "Noto Sans CJK JP", "Yu Gothic", -apple-system, sans-serif; }
    .quiz-char {
      font-size: clamp(5rem, 25vw, 10rem);
      line-height: 1.2;
      font-weight: 700;
    }
    .quiz-reading { font-size: clamp(1.2rem, 5vw, 2rem); }
    .option-btn {
      padding: 1rem;
      border-radius: 1rem;
      font-size: 1.125rem;
      font-weight: 500;
      transition: all 0.15s;
      border: 2px solid #e5e7eb;
      background: #fff;
      width: 100%;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.correct { border-color: #22c55e; background: #f0fdf4; color: #166534; }
    .option-btn.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .option-btn.reveal { border-color: #22c55e; background: #f0fdf4; color: #166534; }
    .option-btn:disabled { cursor: default; opacity: 0.7; }
    .option-btn:disabled:active { transform: none; }
    .mode-tab {
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
      user-select: none;
    }
    .mode-tab.active { background: #dc2626; color: #fff; }
    .mode-tab:not(.active) { background: #f3f4f6; color: #6b7280; }
    .mode-tab:not(.active):active { background: #e5e7eb; }
    .sub-tab {
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
      user-select: none;
    }
    .sub-tab.active { background: #dc2626; color: #fff; }
    .sub-tab:not(.active) { background: #fff; color: #6b7280; border: 1.5px solid #e5e7eb; }
    .sub-tab:not(.active):active { background: #f3f4f6; }
    .stat-box { text-align: center; padding: 0.375rem 0.75rem; border-radius: 0.5rem; }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .shake { animation: shake 0.3s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body class="bg-[#fafaf9] text-[#1e293b] min-h-screen flex flex-col">
  <div class="max-w-lg mx-auto w-full px-4 flex flex-col min-h-screen">

      <button class="mode-tab" data-mode="katakana" onclick="switchMode('katakana')">カタカナ</button>
      <button class="mode-tab" data-mode="vocab" onclick="switchMode('vocab')">単語</button>
    </div>

    <!-- Stats Bar -->

      <div class="stat-box bg-[#fef2f2]"><span class="text-[#ef4444] font-bold" id="wrongCount">0</span></div>

      <div class="stat-box bg-[#f1f5f9]"><span class="text-[#64748b] font-bold" id="totalCount">0</span></div>
    </div>

    <!-- Progress Bar -->

      { word: '要求', reading: 'ようきゅう', meaning: '要求', level: 'N3' },
      { word: '報告', reading: 'ほうこく', meaning: '報告', level: 'N3' },
      { word: '連絡', reading: 'れんらく', meaning: '聯絡', level: 'N3' },
      { word: '相談', reading: 'そうだん', meaning: '商量', level: 'N3' },
      { word: '注意', reading: 'ちゅうい', meaning: '注意', level: 'N3' },
      { word: '目的', reading: 'もくてき', meaning: '目的', level: 'N3' },
      { word: '手段', reading: 'しゅだん', meaning: '手段、方法', level: 'N3' },
    ];

    // ================================================================
    // State
    // ================================================================
    const state = {
      mode: 'hiragana',
      subMode: 'all',
      direction: 'char-to-romaji', // 'char-to-romaji' or 'romaji-to-char'
      answered: false,
      currentQuestion: null,
      stats: { correct: 0, wrong: 0, streak: 0, total: 0 },
      showingVocabMeaning: false, // for vocab mode: true = show meaning, pick word
    };

    // ================================================================
    // Core
    // ================================================================
    function getKanaData() {
      return state.mode === 'hiragana' ? HIRAGANA : KATAKANA;
    }

    function getQuestions() {
      if (state.mode === 'vocab') {
        let words = VOCAB;
        if (state.subMode !== 'all') {
          words = words.filter(w => w.level === state.subMode);
        }
        return words;
      }
      
      const data = getKanaData();
      let chars = [];
      if (state.subMode === 'all') {
        chars = [...data.basic, ...data.dakuten, ...data.handakuten, ...data.youon];
      } else {
        chars = [...(data[state.subMode] || [])];
      }
      return chars;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickN(arr, n, exclude) {
      const filtered = arr.filter(x => x !== exclude);
      const shuffled = shuffle(filtered);
      return shuffled.slice(0, n);
    }

    // ================================================================
    // Quiz Logic
    // ================================================================
    function nextQuestion() {
      if (state.answered) return; // already showing next
      
      const questions = getQuestions();
      if (questions.length === 0) return;

      if (state.mode === 'vocab') {
        nextVocabQuestion(questions);
      } else {
        nextKanaQuestion(questions);
      }
      
      state.answered = false;
      updateStats();
      updateProgress();
    }

    function nextKanaQuestion(questions) {
      const q = questions[Math.floor(Math.random() * questions.length)];
      state.currentQuestion = q;

      // Get all possible romaji from same pool for distractors
      const allRomaji = questions.map(x => x.romaji);
      const wrongOptions = pickN(allRomaji, 3, q.romaji);
      const options = shuffle([q.romaji, ...wrongOptions]);

      const charDisplay = document.getElementById('charDisplay');
      const readingDisplay = document.getElementById('readingDisplay');
      const optionsContainer = document.getElementById('optionsContainer');

      if (state.direction === 'char-to-romaji') {
        charDisplay.textContent = q.char;
        readingDisplay.classList.add('hidden');
        renderOptions(options, q.romaji, 'romaji');
      } else {
        charDisplay.textContent = q.romaji;
        charDisplay.className = 'quiz-char text-[#1e293b] text-5xl';
        readingDisplay.classList.add('hidden');
        renderOptions(options, q.char, 'kana');
      }
    }

    function nextVocabQuestion(questions) {
      const q = questions[Math.floor(Math.random() * questions.length)];
      state.currentQuestion = q;

      // Get wrong meanings from other vocab
      const allMeanings = VOCAB.map(x => x.meaning);
      const wrongOptions = pickN(allMeanings, 3, q.meaning);
      const options = shuffle([q.meaning, ...wrongOptions]);

      const charDisplay = document.getElementById('charDisplay');
      const readingDisplay = document.getElementById('readingDisplay');
      readingDisplay.classList.remove('hidden');
      
      charDisplay.textContent = q.word;
      charDisplay.className = 'quiz-char text-[#1e293b] text-5xl';
      readingDisplay.textContent = q.reading;
      
      renderOptions(options, q.meaning, 'meaning');
    }

    function renderOptions(options, correctAnswer, type) {
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.dataset.value = opt;
        
        btn.addEventListener('click', () => handleAnswer(btn, opt, correctAnswer));
        container.appendChild(btn);
      });
    }

    function handleAnswer(btn, selected, correct) {
      if (state.answered) return;
      state.answered = true;

      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);

      const isCorrect = selected === correct;

      if (isCorrect) {
        btn.classList.add('correct');
        state.stats.correct++;
        state.stats.streak++;
        document.getElementById('feedbackText').textContent = '○ 正解！';
        document.getElementById('feedbackText').className = 'text-sm font-medium text-[#22c55e]';
      } else {
        btn.classList.add('wrong');
        btn.classList.add('shake');
        state.stats.wrong++;
        state.stats.streak = 0;
        document.getElementById('feedbackText').textContent = `✗ 不正解 … 正解：${correct}`;
        document.getElementById('feedbackText').className = 'text-sm font-medium text-[#ef4444]';
        
        // Reveal correct answer
        allBtns.forEach(b => {
          if (b.dataset.value === correct) b.classList.add('reveal');
        });
      }

      state.stats.total++;
      updateStats();

      // Auto advance
      setTimeout(() => {
        document.getElementById('feedbackText').textContent = '';
        document.getElementById('feedbackText').className = 'text-sm font-medium';
        document.getElementById('questionCard').classList.remove('slide-up');
        void document.getElementById('questionCard').offsetWidth;
        document.getElementById('questionCard').classList.add('slide-up');
        nextQuestion();
      }, isCorrect ? 600 : 1500);
    }

    // ================================================================
    // Mode Switching
    // ================================================================
    function switchMode(mode) {
      state.mode = mode;
      state.subMode = 'all';
      state.answered = false;
      document.getElementById('feedbackText').textContent = '';
      document.getElementById('feedbackText').className = 'text-sm font-medium';
      document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === mode);
      });
      document.getElementById('directionBtn').classList.toggle('hidden', mode === 'vocab');
      updateSubTabs();
      document.getElementById('questionCard').classList.remove('slide-up');
      void document.getElementById('questionCard').offsetWidth;
      document.getElementById('questionCard').classList.add('slide-up');
      nextQuestion();
    }

    function switchSubMode(sub) {
      state.subMode = sub;
      state.answered = false;
      document.getElementById('feedbackText').textContent = '';
      document.getElementById('feedbackText').className = 'text-sm font-medium';
      document.querySelectorAll('.sub-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.sub === sub);
      });
      document.getElementById('questionCard').classList.remove('slide-up');
      void document.getElementById('questionCard').offsetWidth;
      document.getElementById('questionCard').classList.add('slide-up');
      nextQuestion();
    }

    function toggleDirection() {
      state.direction = state.direction === 'char-to-romaji' ? 'romaji-to-char' : 'char-to-romaji';
      document.getElementById('directionBtn').textContent = 
        state.direction === 'char-to-romaji' ? '文字 → ローマ字' : 'ローマ字 → 文字';
      state.answered = false;
      document.getElementById('feedbackText').textContent = '';
      document.getElementById('feedbackText').className = 'text-sm font-medium';
      nextQuestion();
    }

    function updateSubTabs() {
      const container = document.getElementById('subTabs');
      
      if (state.mode === 'vocab') {
        container.innerHTML = `
          <button class="sub-tab active" data-sub="all" onclick="switchSubMode('all')">全部 (${VOCAB.length})</button>
          <button class="sub-tab" data-sub="N5" onclick="switchSubMode('N5')">N5 (${VOCAB.filter(w => w.level === 'N5').length})</button>
          <button class="sub-tab" data-sub="N4" onclick="switchSubMode('N4')">N4 (${VOCAB.filter(w => w.level === 'N4').length})</button>
          <button class="sub-tab" data-sub="N3" onclick="switchSubMode('N3')">N3 (${VOCAB.filter(w => w.level === 'N3').length})</button>
        `;
      } else {
        const data = getKanaData();
        const total = data.basic.length + data.dakuten.length + data.handakuten.length + data.youon.length;
        container.innerHTML = `
          <button class="sub-tab active" data-sub="all" onclick="switchSubMode('all')">全部 (${total})</button>
          <button class="sub-tab" data-sub="basic" onclick="switchSubMode('basic')">基本 (${data.basic.length})</button>
          <button class="sub-tab" data-sub="dakuten" onclick="switchSubMode('dakuten')">濁音 (${data.dakuten.length + data.handakuten.length})</button>
          <button class="sub-tab" data-sub="youon" onclick="switchSubMode('youon')">拗音 (${data.youon.length})</button>
        `;
      }
    }

    // ================================================================
    // UI Updates
    // ================================================================
    function updateStats() {
      document.getElementById('correctCount').textContent = state.stats.correct;
      document.getElementById('wrongCount').textContent = state.stats.wrong;
      document.getElementById('streakCount').textContent = state.stats.streak;
      document.getElementById('totalCount').textContent = state.stats.total;
    }

    function updateProgress() {
      const total = getQuestions().length;
      const done = state.stats.total;
      const pct = Math.min(100, (done / Math.max(total, 1)) * 100);
      document.getElementById('progressBar').style.width = `${pct}%`;
    }

    // ================================================================
    // Keyboard Support
    // ================================================================
    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '4') {
        const btns = document.querySelectorAll('.option-btn:not(:disabled)');
        const idx = parseInt(e.key) - 1;
        if (btns[idx]) btns[idx].click();
      }
    });

    // ================================================================
    // Init
    // ================================================================
    updateSubTabs();
    nextQuestion();
  </script>
