<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日本語ドリル — Flashcard Drill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: "Hiragino Sans", "Noto Sans CJK JP", "Yu Gothic", -apple-system, sans-serif; }
    .card-scene { perspective:1200px; width:100%; aspect-ratio:4/3; max-height:56vh; cursor:pointer; user-select:none; }
    .card-inner { position:relative; width:100%; height:100%; transition:transform .45s ease; transform-style:preserve-3d; }
    .card-inner.flipped { transform:rotateY(180deg); }
    .card-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:1.25rem; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; }
    .card-front { background:#fff; border:1.5px solid #e5e7eb; z-index:2; }
    .card-back { background:#fefce8; border:1.5px solid #fde68a; transform:rotateY(180deg); }
    .char-main { font-size:clamp(4rem,20vw,8rem); font-weight:700; line-height:1.1; text-align:center; word-break:keep-all; }
    .char-sub { font-size:clamp(1rem,4vw,1.5rem); color:#94a3b8; margin-top:.25rem; }
    .char-tip { font-size:clamp(.85rem,2.5vw,1.05rem); color:#a16207; background:#fef9c3; padding:.5rem 1rem; border-radius:.75rem; margin-top:.75rem; max-width:90%; text-align:center; line-height:1.4; }
    .assess-btn { padding:.85rem 1.5rem; border-radius:1rem; font-size:1.05rem; font-weight:600; transition:all .15s; border:none; cursor:pointer; user-select:none; flex:1; }
    .assess-btn:active { transform:scale(.96); }
    .assess-btn:disabled { opacity:.4; cursor:default; transform:none; }
    .btn-gotit { background:#dcfce7; color:#166534; }
    .btn-gotit:not(:disabled):hover { background:#bbf7d0; }
    .btn-again { background:#fef3c7; color:#92400e; }
    .btn-again:not(:disabled):hover { background:#fde68a; }
    .mode-tab { padding:.5rem 1rem; border-radius:.75rem; font-size:.9rem; font-weight:500; transition:all .15s; cursor:pointer; user-select:none; }
    .mode-tab.active { background:#dc2626; color:#fff; }
    .mode-tab:not(.active) { background:#f3f4f6; color:#6b7280; }
    .sub-tab { padding:.35rem .75rem; border-radius:9999px; font-size:.8rem; font-weight:500; transition:all .15s; cursor:pointer; user-select:none; }
    .sub-tab.active { background:#dc2626; color:#fff; }
    .sub-tab:not(.active) { background:#fff; color:#6b7280; border:1.5px solid #e5e7eb; }
    .stat-pill { display:inline-flex; align-items:center; gap:.25rem; padding:.3rem .7rem; border-radius:9999px; font-size:.8rem; font-weight:600; }
    .fade-in { animation:fadeIn .25s ease-out; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .slide-up { animation:slideUp .3s ease-out; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .bounce-in { animation:bounceIn .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes bounceIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .shake { animation:shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .confetti-piece { position:fixed; width:10px; height:10px; animation:confettiFall 1.5s ease-out forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translateY(200px) rotate(720deg) scale(.3)} }
    .srs-badge { display:inline-block; padding:.2rem .6rem; border-radius:9999px; font-size:.7rem; font-weight:600; letter-spacing:.04em; }
    .srs-badge.new { background:#dbeafe; color:#1e40af; }
    .srs-badge.learning { background:#fef3c7; color:#92400e; }
    .srs-badge.review { background:#dcfce7; color:#166534; }
    .srs-badge.mastered { background:#e0e7ff; color:#3730a3; }
    .speaker-btn { position:absolute; bottom:.75rem; right:.75rem; width:2.5rem; height:2.5rem; border-radius:9999px; background:#f1f5f9; border:1.5px solid #e2e8f0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.3rem; transition:all .15s; user-select:none; z-index:10; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .speaker-btn:active { transform:scale(.9); background:#e2e8f0; }
  </style>
</head>
<body class="bg-[#fafaf9] text-[#1e293b] min-h-screen flex flex-col">
  <div class="max-w-lg mx-auto w-full px-4 flex flex-col min-h-screen">
    <header class="pt-4 pb-2 text-center">
      <h1 class="text-xl font-bold tracking-tight">日本語ドリル</h1>
      <p class="text-xs text-[#94a3b8] mt-0.5">タップしてめくる — フラッシュカード</p>
    </header>
    <div class="flex gap-2 justify-center mb-2">
      <button class="mode-tab active" data-mode="hiragana" onclick="switchMode('hiragana')">ひらがな</button>
      <button class="mode-tab" data-mode="katakana" onclick="switchMode('katakana')">カタカナ</button>
      <button class="mode-tab" data-mode="vocab" onclick="switchMode('vocab')">単語</button>
    </div>
    <div id="subTabs" class="flex flex-wrap gap-2 justify-center mb-3"></div>
    <div id="statsBar" class="flex items-center justify-center gap-2 mb-3 text-xs">
      <span class="stat-pill bg-[#f0fdf4]">✅ <span id="sessionCorrect">0</span></span>
      <span class="stat-pill bg-[#fef2f2]">🔄 <span id="sessionAgain">0</span></span>
      <span class="stat-pill bg-[#fff7ed]">🔥 <span id="streakCount">0</span></span>
      <span class="stat-pill bg-[#f1f5f9]">📝 <span id="todayCount">0</span></span>
    </div>
    <div class="flex items-center justify-between mb-2 text-xs text-[#94a3b8]">
      <span id="progressLabel">0 / 0</span>
      <span id="srsStatusBadge"></span>
    </div>
    <div class="w-full bg-[#e2e8f0] rounded-full h-1.5 mb-3 overflow-hidden">
      <div id="progressBar" class="h-full bg-[#dc2626] rounded-full transition-all duration-300" style="width:0%"></div>
    </div>
    <div id="quizArea" class="flex-1 flex flex-col items-center justify-center min-h-0">
      <div id="emptyState" class="hidden text-center py-8 slide-up">
        <div class="text-4xl mb-3">🎉</div>
        <div class="text-lg font-bold">お疲れさま！</div>
        <p class="text-sm text-[#94a3b8] mt-1" id="emptyStateMsg">今日の復習は終わりました</p>
        <button onclick="resetSession()" class="mt-4 text-sm text-[#dc2626] font-medium underline underline-offset-2">もう一度始める</button>
      </div>
      <div id="cardWrapper" class="w-full card-scene" onclick="flipCard()">
        <div id="cardInner" class="card-inner">
          <div class="card-face card-front">
            <div id="frontSrsBadge" class="srs-badge new mb-2"></div>
            <div id="frontChar" class="char-main">あ</div>
            <div id="frontSub" class="char-sub"></div>
            <button id="speakFront" class="speaker-btn" onclick="event.stopPropagation();speakCurrent()">🔊</button>
          </div>
          <div class="card-face card-back">
            <div id="backAnswer" class="char-main text-[#a16207]"></div>
            <div id="backSub" class="char-sub text-[#a16207]"></div>
            <div id="backTip" class="char-tip"></div>
            <button id="speakBack" class="speaker-btn" onclick="event.stopPropagation();speakCurrent()">🔊</button>
          </div>
        </div>
      </div>
      <div id="assessArea" class="hidden w-full mt-4 flex gap-3 slide-up">
        <button id="btnAgain" class="assess-btn btn-again" onclick="assessCard('again')">🔄 もう一度</button>
        <button id="btnGotit" class="assess-btn btn-gotit" onclick="assessCard('gotit')">✅ わかった</button>
      </div>
      <p id="tapHint" class="text-xs text-[#94a3b8] mt-4 animate-pulse">タップして答えを見る</p>
    </div>
    <footer class="pb-4 pt-3 text-center flex items-center justify-center gap-3">
      <button onclick="toggleDirection()" id="directionBtn" class="text-xs text-[#94a3b8] hover:text-[#64748b] transition-colors px-3 py-1.5 rounded-lg border border-[#e5e7eb]">文字 → ローマ字</button>
      <button onclick="resetAllProgress()" class="text-xs text-[#94a3b8] hover:text-[#ef4444] transition-colors px-3 py-1.5 rounded-lg border border-[#e5e7eb]">リセット</button>
    </footer>
  </div>
  <script>
const TIPS={a:'張大嘴像「啊」',i:'嘴角拉開像「伊」',u:'嘴不圓突像「烏」嘴不向前凸',e:'「欸」的短音嘴半開',o:'口形圓像「哦」',ka:'「咖」的k+啊',ki:'「key」的ki舌抵上顎',ku:'「庫」的k+烏',ke:'「開」的ke嘴拉開',ko:'「摳」的k+哦',sa:'「薩」的s+啊',shi:'像「西」舌尖抵上顎',su:'「思」尾音嘴放鬆',se:'「塞」的s+欸',so:'「嗦」的s+哦',ta:'「他」的t+啊',chi:'像「七」舌尖碰上顎',tsu:'像「次」嘴較圓舌尖抵牙齦',te:'「鐵」的t+欸',to:'「偷」的t+哦',na:'「那」的n+啊',ni:'「你」的n+伊',nu:'「奴」的n+烏',ne:'「內」的n+欸',no:'「喏」的n+哦',ha:'「哈」的h+啊',hi:'像「嘿」但更輕短舌面靠近上顎',fu:'像「夫」但上唇不碰下唇吹氣感',he:'「嘿」的h+欸',ho:'「呵」的h+哦',ma:'「媽」的m+啊',mi:'「咪」的m+伊',mu:'「木」的m+烏',me:'「咩」的m+欸',mo:'「摸」的m+哦',ya:'「呀」短促',yu:'「優」短音唇不圓',yo:'「喲」短促',ra:'舌尖輕彈上顎像「啦」更輕',ri:'舌尖輕彈像「哩」更短',ru:'舌尖輕彈像「路」輕聲',re:'舌尖輕彈像「咧」',ro:'舌尖輕彈像「咯」',wa:'「哇」短促',wo:'像「喔」唇呈圓形',n:'「嗯」鼻音閉嘴'};
function getTip(r){if(TIPS[r])return TIPS[r];if(r.startsWith('g')){let b=TIPS[r.slice(1)];return'濁音聲帶震動：'+(b||r.slice(1))}if(r.startsWith('z')&&!r.startsWith('zu')){let b=TIPS[r.slice(1)];return'濁音ざ行舌尖抵上顎：'+(b||r.slice(1))}if(r==='zu')return'濁音す濁音化聲帶震動';if(r.startsWith('d')){let b=TIPS[r.slice(1)];return'濁音だ行舌尖抵上顎：'+(b||r.slice(1))}if(r==='ji')return'じ或ぢ像「姬」短音';if(r.startsWith('b')){let b=TIPS[r.slice(1)];return'濁音ば行雙唇閉合聲帶震動：'+(b||r.slice(1))}if(r.startsWith('p')){let b=TIPS[r.slice(1)];return'半濁音雙唇閉合送氣：'+(b||r.slice(1))}if(r.endsWith('ya')||r.endsWith('yu')||r.endsWith('yo')){let br=r.slice(0,-1),sr=r.slice(-2),b=TIPS[br]||br,s=TIPS[sr]||sr;return'拗音「'+br+sr+'」連讀一拍：'+b+'+'+s}return''}
const HIRAGANA={basic:[{char:'あ',romaji:'a'},{char:'い',romaji:'i'},{char:'う',romaji:'u'},{char:'え',romaji:'e'},{char:'お',romaji:'o'},{char:'か',romaji:'ka'},{char:'き',romaji:'ki'},{char:'く',romaji:'ku'},{char:'け',romaji:'ke'},{char:'こ',romaji:'ko'},{char:'さ',romaji:'sa'},{char:'し',romaji:'shi'},{char:'す',romaji:'su'},{char:'せ',romaji:'se'},{char:'そ',romaji:'so'},{char:'た',romaji:'ta'},{char:'ち',romaji:'chi'},{char:'つ',romaji:'tsu'},{char:'て',romaji:'te'},{char:'と',romaji:'to'},{char:'な',romaji:'na'},{char:'に',romaji:'ni'},{char:'ぬ',romaji:'nu'},{char:'ね',romaji:'ne'},{char:'の',romaji:'no'},{char:'は',romaji:'ha'},{char:'ひ',romaji:'hi'},{char:'ふ',romaji:'fu'},{char:'へ',romaji:'he'},{char:'ほ',romaji:'ho'},{char:'ま',romaji:'ma'},{char:'み',romaji:'mi'},{char:'む',romaji:'mu'},{char:'め',romaji:'me'},{char:'も',romaji:'mo'},{char:'や',romaji:'ya'},{char:'ゆ',romaji:'yu'},{char:'よ',romaji:'yo'},{char:'ら',romaji:'ra'},{char:'り',romaji:'ri'},{char:'る',romaji:'ru'},{char:'れ',romaji:'re'},{char:'ろ',romaji:'ro'},{char:'わ',romaji:'wa'},{char:'を',romaji:'wo'},{char:'ん',romaji:'n'}],dakuten:[{char:'が',romaji:'ga'},{char:'ぎ',romaji:'gi'},{char:'ぐ',romaji:'gu'},{char:'げ',romaji:'ge'},{char:'ご',romaji:'go'},{char:'ざ',romaji:'za'},{char:'じ',romaji:'ji'},{char:'ず',romaji:'zu'},{char:'ぜ',romaji:'ze'},{char:'ぞ',romaji:'zo'},{char:'だ',romaji:'da'},{char:'ぢ',romaji:'ji'},{char:'づ',romaji:'zu'},{char:'で',romaji:'de'},{char:'ど',romaji:'do'},{char:'ば',romaji:'ba'},{char:'び',romaji:'bi'},{char:'ぶ',romaji:'bu'},{char:'べ',romaji:'be'},{char:'ぼ',romaji:'bo'}],handakuten:[{char:'ぱ',romaji:'pa'},{char:'ぴ',romaji:'pi'},{char:'ぷ',romaji:'pu'},{char:'ぺ',romaji:'pe'},{char:'ぽ',romaji:'po'}],youon:[{char:'きゃ',romaji:'kya'},{char:'きゅ',romaji:'kyu'},{char:'きょ',romaji:'kyo'},{char:'しゃ',romaji:'sha'},{char:'しゅ',romaji:'shu'},{char:'しょ',romaji:'sho'},{char:'ちゃ',romaji:'cha'},{char:'ちゅ',romaji:'chu'},{char:'ちょ',romaji:'cho'},{char:'にゃ',romaji:'nya'},{char:'にゅ',romaji:'nyu'},{char:'にょ',romaji:'nyo'},{char:'ひゃ',romaji:'hya'},{char:'ひゅ',romaji:'hyu'},{char:'ひょ',romaji:'hyo'},{char:'みゃ',romaji:'mya'},{char:'みゅ',romaji:'myu'},{char:'みょ',romaji:'myo'},{char:'りゃ',romaji:'rya'},{char:'りゅ',romaji:'ryu'},{char:'りょ',romaji:'ryo'},{char:'ぎゃ',romaji:'gya'},{char:'ぎゅ',romaji:'gyu'},{char:'ぎょ',romaji:'gyo'},{char:'じゃ',romaji:'ja'},{char:'じゅ',romaji:'ju'},{char:'じょ',romaji:'jo'},{char:'びゃ',romaji:'bya'},{char:'びゅ',romaji:'byu'},{char:'びょ',romaji:'byo'},{char:'ぴゃ',romaji:'pya'},{char:'ぴゅ',romaji:'pyu'},{char:'ぴょ',romaji:'pyo'}]};

const SRS_KEY='jp_srs_v2',STATS_KEY='jp_stats_v2';
let srsData={},dailyStats={date:'',correct:0,again:0,total:0};
function loadSRS(){try{let r=localStorage.getItem(SRS_KEY);srsData=r?JSON.parse(r):{}}catch{srsData={}}try{let r=localStorage.getItem(STATS_KEY);if(r){dailyStats=JSON.parse(r);let t=new Date().toISOString().slice(0,10);if(dailyStats.date!==t)dailyStats={date:t,correct:0,again:0,total:0}}else dailyStats={date:new Date().toISOString().slice(0,10),correct:0,again:0,total:0}}catch{dailyStats={date:new Date().toISOString().slice(0,10),correct:0,again:0,total:0}}}
function saveSRS(){localStorage.setItem(SRS_KEY,JSON.stringify(srsData));localStorage.setItem(STATS_KEY,JSON.stringify(dailyStats))}
function getCard(id){if(!srsData[id])srsData[id]={interval:0,ease:2.5,reps:0,nextReview:0,lastReviewed:null};return srsData[id]}
function srsStatus(id){let c=getCard(id);return c.reps===0?'new':c.reps<3?'learning':c.reps<5?'review':'mastered'}
function reviewCard(id,gotit){let c=getCard(id),q=gotit?4:1;if(q>=3){if(c.reps===0)c.interval=1;else if(c.reps===1)c.interval=3;else c.interval=Math.round(c.interval*c.ease);c.reps++}else{c.reps=0;c.interval=0}c.ease=Math.max(1.3,c.ease+(.1-(5-q)*(.08+(5-q)*.02)));c.lastReviewed=Date.now();c.nextReview=q>=3?Date.now()+c.interval*864e5:Date.now()+6e5;dailyStats.total++;gotit?dailyStats.correct++:dailyStats.again++;saveSRS();return c}
function resetAllSRS(){if(!confirm('すべての進捗をリセットしますか？（元に戻せません）'))return;srsData={};dailyStats={date:new Date().toISOString().slice(0,10),correct:0,again:0,total:0};saveSRS();location.reload()}
function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=.85;window.speechSynthesis.speak(u)}
function stopSpeech(){if(window.speechSynthesis)window.speechSynthesis.cancel()}
function speakCurrent(){if(!state.currentCard)return;let c=state.currentCard;if(c.type==='vocab'){speak(c.data.word)}else if(c.type==='hiragana'||c.type==='katakana'){speak(c.data.char)}}
const state={mode:'hiragana',subMode:'all',direction:'char-to-romaji',isFlipped:false,isAssessed:false,currentCard:null,queue:[],queueIndex:0,retryQueue:[],retryCount:{},sessionCorrect:0,sessionAgain:0,streak:0};
function kanaId(m,c){return m+'_'+c}
function vocabId(w){return'vocab_'+w}
function getKanaData(){return state.mode==='hiragana'?HIRAGANA:KATAKANA}
function getAllCards(){if(state.mode==='vocab'){let w=VOCAB;if(state.subMode!=='all')w=w.filter(v=>v.level===state.subMode);return w.map((v,i)=>({id:vocabId(v.word),type:'vocab',data:v,index:i}))}let d=getKanaData(),c;if(state.subMode==='all')c=[...d.basic,...d.dakuten,...d.handakuten,...d.youon];else if(state.subMode==='dakuten')c=[...d.dakuten,...d.handakuten];else c=[...(d[state.subMode]||[])];return c.map((x,i)=>({id:kanaId(state.mode,x.char),type:state.mode,data:x,index:i}))}
function shuffle(a){let s=[...a];for(let i=s.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]]}return s}
function buildQueue(){let all=getAllCards(),now=Date.now(),due=[],nc=[];for(let c of all){let s=getCard(c.id);if(s.nextReview<=now&&s.reps>0)due.push(c);else if(s.reps===0)nc.push(c)}state.queue=[...shuffle(due),...shuffle(nc).slice(0,15)];state.queueIndex=0;state.retryQueue=[];state.retryCount={};return state.queue.length}
function getNextCard(){if(state.retryQueue&&state.retryQueue.length>0){let now=Date.now(),idx=state.retryQueue.findIndex(r=>r.readyAt<=now);if(idx>=0){let c=state.retryQueue[idx];state.retryQueue.splice(idx,1);return c.card}}if(state.queueIndex<state.queue.length){let c=state.queue[state.queueIndex];state.queueIndex++;return c}return null}
function enqueueRetry(card){if(!state.retryCount)state.retryCount={};state.retryCount[card.id]=(state.retryCount[card.id]||0)+1;let delays=[30,120,300],attempt=Math.min(state.retryCount[card.id]-1,delays.length-1);if(!state.retryQueue)state.retryQueue=[];state.retryQueue.push({card,readyAt:Date.now()+delays[attempt]*1e3})}
function remainingCards(){let c=state.queue.length-state.queueIndex;if(state.retryQueue)c+=state.retryQueue.filter(r=>r.readyAt<=Date.now()).length;return Math.max(0,c)}
function renderCard(card){state.currentCard=card;state.isFlipped=false;state.isAssessed=false;let ci=document.getElementById('cardInner'),aa=document.getElementById('assessArea'),th=document.getElementById('tapHint'),es=document.getElementById('emptyState'),cw=document.getElementById('cardWrapper');aa.classList.add('hidden');es.classList.add('hidden');cw.classList.remove('hidden');th.classList.remove('hidden');ci.classList.remove('flipped');let ss=srsStatus(card.id);document.getElementById('frontSrsBadge').textContent={new:'新規',learning:'復習中',review:'定着中',mastered:'マスター'}[ss]||'新規';document.getElementById('frontSrsBadge').className='srs-badge '+ss+' mb-2';if(card.type==='vocab'){document.getElementById('frontChar').textContent=card.data.word;document.getElementById('frontChar').className='char-main text-[#1e293b]';document.getElementById('frontSub').textContent=card.data.level}else{if(state.direction==='char-to-romaji'){document.getElementById('frontChar').textContent=card.data.char;document.getElementById('frontChar').style.fontSize=''}else{document.getElementById('frontChar').textContent=card.data.romaji;document.getElementById('frontChar').className='char-main text-[#1e293b]';document.getElementById('frontChar').style.fontSize='clamp(3rem,12vw,5rem)'}document.getElementById('frontSub').textContent=''}updateProgress()}
function renderCardBack(card){let d=card.data,ba=document.getElementById('backAnswer'),bs=document.getElementById('backSub'),bt=document.getElementById('backTip');if(card.type==='vocab'){ba.textContent=d.meaning;ba.style.fontSize='clamp(1.5rem,6vw,2.5rem)';bs.textContent='【'+d.reading+'】';if(d.ex){bt.textContent='例文：'+d.ex;bt.className='char-tip';bt.classList.remove('hidden')}else{bt.classList.add('hidden')}}else{if(state.direction==='char-to-romaji'){ba.textContent=d.romaji;ba.style.fontSize=''}else{ba.textContent=d.char;ba.style.fontSize=''}let tip=getTip(d.romaji);if(tip){bt.textContent='💡 '+tip;bt.className='char-tip';bt.classList.remove('hidden')}else{bt.classList.add('hidden')}bs.textContent=''}}
function flipCard(){if(state.isAssessed||!state.currentCard||state.isFlipped)return;state.isFlipped=true;document.getElementById('cardInner').classList.add('flipped');renderCardBack(state.currentCard);document.getElementById('tapHint').classList.add('hidden');document.getElementById('assessArea').classList.remove('hidden');document.getElementById('btnGotit').disabled=false;document.getElementById('btnAgain').disabled=false;setTimeout(speakCurrent,350)}
function assessCard(result){if(state.isAssessed||!state.currentCard)return;state.isAssessed=true;document.getElementById('btnGotit').disabled=true;document.getElementById('btnAgain').disabled=true;let card=state.currentCard,gotit=result==='gotit';reviewCard(card.id,gotit);if(gotit){state.sessionCorrect++;state.streak++}else{state.sessionAgain++;state.streak=0;enqueueRetry(card)}updateStats();let aa=document.getElementById('assessArea');aa.innerHTML=gotit?'<div class="text-center text-[#22c55e] font-bold text-lg bounce-in">✓ わかった！</div>':'<div class="text-center text-[#f97316] font-bold text-lg shake">もう一度！</div>';if(state.streak>0&&state.streak%5===0)burstConfetti();setTimeout(()=>{aa.innerHTML='';aa.classList.add('hidden');advanceToNext()},gotit?500:900)}
function advanceToNext(){stopSpeech();let next=getNextCard();if(next){document.getElementById('assessArea').innerHTML='<button id="btnAgain" class="assess-btn btn-again" onclick="assessCard(\'again\')">🔄 もう一度</button><button id="btnGotit" class="assess-btn btn-gotit" onclick="assessCard(\'gotit\')">✅ わかった</button>';let cw=document.getElementById('cardWrapper');cw.classList.remove('slide-up');void cw.offsetWidth;cw.classList.add('slide-up');renderCard(next)}else showSessionComplete()}
function showSessionComplete(){document.getElementById('cardWrapper').classList.add('hidden');document.getElementById('assessArea').classList.add('hidden');document.getElementById('tapHint').classList.add('hidden');document.getElementById('emptyState').classList.remove('hidden');let t=state.sessionCorrect+state.sessionAgain,pct=t>0?Math.round(state.sessionCorrect/t*100):0,msg='このセッションで '+t+' 枚のカードを復習しました。';if(t>0)msg+=' 正解率 '+pct+'%';let due=getAllCards().filter(c=>getCard(c.id).nextReview<=Date.now()).length;if(due>0)msg+=' あと '+due+' 枚の復習あり';else msg+=' 🎉 すべて終了！';document.getElementById('emptyStateMsg').textContent=msg;burstConfetti()}
function burstConfetti(){let cl=['#dc2626','#22c55e','#3b82f6','#f97316','#a855f7','#eab308','#ec4899'];for(let i=0;i<30;i++){let e=document.createElement('div');e.className='confetti-piece';e.style.left=(10+Math.random()*80)+'%';e.style.top=(30+Math.random()*30)+'%';e.style.background=cl[Math.floor(Math.random()*cl.length)];e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.width=(6+Math.random()*8)+'px';e.style.height=(6+Math.random()*8)+'px';e.style.animationDuration=(1+Math.random())+'s';e.style.animationDelay=(Math.random()*.3)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),2000)}}
function switchMode(mode){state.mode=mode;state.subMode='all';state.isFlipped=false;state.isAssessed=false;document.getElementById('assessArea').classList.add('hidden');document.getElementById('tapHint').classList.remove('hidden');document.getElementById('emptyState').classList.add('hidden');document.getElementById('cardWrapper').classList.remove('hidden');document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===mode));document.getElementById('directionBtn').classList.toggle('hidden',mode==='vocab');updateSubTabs();buildQueue();let first=getNextCard();if(first){let cw=document.getElementById('cardWrapper');cw.classList.remove('slide-up');void cw.offsetWidth;cw.classList.add('slide-up');renderCard(first)}else showSessionComplete()}
function switchSubMode(sub){state.subMode=sub;state.isFlipped=false;state.isAssessed=false;document.getElementById('assessArea').classList.add('hidden');document.getElementById('tapHint').classList.remove('hidden');document.getElementById('emptyState').classList.add('hidden');document.getElementById('cardWrapper').classList.remove('hidden');document.querySelectorAll('.sub-tab').forEach(t=>t.classList.toggle('active',t.dataset.sub===sub));buildQueue();let first=getNextCard();if(first){let cw=document.getElementById('cardWrapper');cw.classList.remove('slide-up');void cw.offsetWidth;cw.classList.add('slide-up');renderCard(first)}else showSessionComplete()}
function toggleDirection(){state.direction=state.direction==='char-to-romaji'?'romaji-to-char':'char-to-romaji';document.getElementById('directionBtn').textContent=state.direction==='char-to-romaji'?'文字 → ローマ字':'ローマ字 → 文字';state.isFlipped=false;state.isAssessed=false;document.getElementById('cardInner').classList.remove('flipped');document.getElementById('assessArea').classList.add('hidden');document.getElementById('tapHint').classList.remove('hidden');if(state.currentCard)renderCard(state.currentCard)}
function updateSubTabs(){let c=document.getElementById('subTabs');if(state.mode==='vocab'){let n5=VOCAB.filter(w=>w.level==='N5').length,n4=VOCAB.filter(w=>w.level==='N4').length,n3=VOCAB.filter(w=>w.level==='N3').length;c.innerHTML='<button class="sub-tab active" data-sub="all" onclick="switchSubMode(\'all\')">全部 ('+(n5+n4+n3)+')</button><button class="sub-tab" data-sub="N5" onclick="switchSubMode(\'N5\')">N5 ('+n5+')</button><button class="sub-tab" data-sub="N4" onclick="switchSubMode(\'N4\')">N4 ('+n4+')</button><button class="sub-tab" data-sub="N3" onclick="switchSubMode(\'N3\')">N3 ('+n3+')</button>'}else{let d=getKanaData(),t=d.basic.length+d.dakuten.length+d.handakuten.length+d.youon.length;c.innerHTML='<button class="sub-tab active" data-sub="all" onclick="switchSubMode(\'all\')">全部 ('+t+')</button><button class="sub-tab" data-sub="basic" onclick="switchSubMode(\'basic\')">基本 ('+d.basic.length+')</button><button class="sub-tab" data-sub="dakuten" onclick="switchSubMode(\'dakuten\')">濁音 ('+(d.dakuten.length+d.handakuten.length)+')</button><button class="sub-tab" data-sub="youon" onclick="switchSubMode(\'youon\')">拗音 ('+d.youon.length+')</button>'}}
function resetSession(){state.sessionCorrect=0;state.sessionAgain=0;state.streak=0;document.getElementById('emptyState').classList.add('hidden');document.getElementById('cardWrapper').classList.remove('hidden');buildQueue();let first=getNextCard();if(first)renderCard(first);else showSessionComplete();updateStats()}
function updateStats(){document.getElementById('sessionCorrect').textContent=state.sessionCorrect;document.getElementById('sessionAgain').textContent=state.sessionAgain;document.getElementById('streakCount').textContent=state.streak;document.getElementById('todayCount').textContent=dailyStats.total||0}
function updateProgress(){let all=getAllCards(),t=all.length,qlen=state.queue.length,done=Math.min(state.queueIndex+1,qlen),pct=qlen>0?Math.round(done/qlen*100):0;document.getElementById('progressBar').style.width=Math.min(100,pct)+'%';document.getElementById('progressLabel').textContent=done+' / '+qlen;let mastered=all.filter(c=>srsStatus(c.id)==='mastered').length,learning=all.filter(c=>{let s=srsStatus(c.id);return s==='learning'||s==='review'}).length;document.getElementById('srsStatusBadge').textContent=mastered>0||learning>0?'👍 '+mastered+' ⏳ '+learning:''}
function resetAllProgress(){resetAllSRS()}
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();if(!state.isFlipped)flipCard()}if(e.key==='1'&&state.isFlipped&&!state.isAssessed)assessCard('gotit');if(e.key==='2'&&state.isFlipped&&!state.isAssessed)assessCard('again')});
loadSRS();updateSubTabs();buildQueue();let firstCard=getNextCard();if(firstCard)renderCard(firstCard);else showSessionComplete();updateStats();
  </script>
</body>
</html>
